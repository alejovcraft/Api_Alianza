<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Alianza Lima | Club del Pueblo</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
    <script src="https://kit.fontawesome.com/a2e0f1f6b1.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --alianza-azul: #002244; /* Azul profundo Alianza */
            --alianza-dorado: #B8A26A;
            --alianza-blanco: #ffffff;
        }

        body {
            padding-top: 56px;
            background-color: #f8f9fa;
        }

        .navbar-brand { font-weight: bold; }
        .bg-primary { background-color: var(--alianza-azul) !important; }

        .footer {
            background-color: var(--alianza-azul);
            color: var(--alianza-blanco);
            text-align: center;
            font-size: 0.8rem;
            padding: 1rem 0;
        }

        .combo-section {
            position: relative;
            background: url('/img/compraentrada/estadio2.jpg') center center / cover no-repeat;
            color: white;
            margin-bottom: 2rem; /* Separación entre cada partido */
        }

        .combo-overlay {
            background: rgba(0, 0, 0, 0.6);
            padding: 4rem 0;
        }

        .combo-title {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .combo-logo { height: 60px; }

        .combo-card {
            background-color: white;
            color: black;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            max-width: 800px;
        }

        .combo-card-logo { height: 60px; }

        .btn-comprar {
            background-color: var(--alianza-dorado);
            color: white;
            font-weight: bold;
            border-radius: 6px;
            padding: 0.6rem 1.2rem;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        .btn-comprar:hover {
            background-color: #9A845C;
            color: white;
        }

        @media (max-width: 768px) {
            .combo-card { flex-direction: column; text-align: center; }
            .btn-comprar { margin-top: 1rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <a class="navbar-brand" th:href="@{/general}">Alianza Lima</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/general}">Inicio</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/Entradas/disponibles}">Entradas</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/Producto/Producto}">Productos</a></li>
                
                <li class="nav-item" sec:authorize="hasRole('USER')">
                    <a class="nav-link" th:href="@{/Carrito/Carrito}">Mi Carrito</a>
                </li>
            </ul>
            
            <ul class="navbar-nav">
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link btn btn-outline-light" th:href="@{/General/login}">Iniciar Sesión</a> 
                </li>

                <li class="nav-item text-light d-flex align-items-center mr-3" sec:authorize="isAuthenticated()">
                    Bienvenido, <strong class="ml-1" sec:authentication="name">Hincha</strong>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit" class="nav-link btn btn-link text-danger font-weight-bold" style="border: none; cursor: pointer;">Cerrar Sesión</button>
                    </form>
                </li>
            </ul>
        </div>
    </nav>

    <div id="entradas-container">
        
        <div class="container text-center py-5">
            <h1 class="combo-title my-3" style="color: #002244;">🎟️ Próximos Partidos 🎟️</h1>
        </div>

        <div th:each="entrada : ${listaEntradas}">
            
            <section class="combo-section">
                <div class="combo-overlay">
                    <div class="container text-center text-white py-5">
                        
                        <div class="d-flex justify-content-center align-items-center mb-3 flex-wrap">
                            <img src="/img/compraentrada/alianzaentrada.png" class="mx-3 combo-logo" alt="Logo">
                            
                            <h1 class="combo-title my-3" th:text="${entrada.evento} + ' - ' + ${entrada.id_ubicacion}">Partido - Tribuna</h1>
                            
                            <img src="/img/compraentrada/alianzaentrada2.png" class="mx-3 combo-logo" alt="Logo">
                        </div>

                        <div class="combo-card mx-auto d-flex align-items-center justify-content-between p-3 flex-wrap">
                            <div class="d-flex align-items-center flex-wrap">
                                <img src="/img/compraentrada/alianzaentrada3.png" class="combo-card-logo mr-3 mb-2 mb-md-0" alt="Ticket">
                                <div class="text-left">
                                    
                                    <p class="m-0 text-uppercase text-secondary small font-weight-bold" 
                                       th:text="'Fecha: ' + ${#temporals.format(entrada.fecha, 'dd/MM/yyyy')}">Fecha: 00/00/0000</p>
                                       
                                    <h5 class="m-0 font-weight-bold" 
                                        th:text="'S/ ' + ${#numbers.formatDecimal(entrada.precio, 1, 2)} + ' | Stock: ' + ${entrada.cantidad_disponible}">S/ 0.00 | Stock: 0</h5>
                                </div>
                            </div>
                            
                            <a th:href="@{/Entradas/comprar/{id}(id=${entrada.id_entrada})}" class="btn btn-comprar mt-3 mt-md-0">
                                <i class="fas fa-ticket-alt mr-2"></i> Comprar Ahora
                            </a>
                        </div>
                    </div>
                </div>
            </section>
        </div>
        
    </div>

    <footer class="footer mt-5">
        <p th:text="'© ' + ${#dates.format(#dates.createNow(), 'yyyy')} + ' Club Alianza Lima - Todos los derechos reservados'"></p>
    </footer>

</body>
</html>
